# This workflow is triggered when a GitHub release is created.
# It can also be run manually to re-publish to NPM in case it failed for some reason.
# You can run this workflow by navigating to https://www.github.com/coingecko/coingecko-typescript/actions/workflows/publish-npm.yml
name: Publish NPM
on:
  workflow_dispatch:
    inputs:
      path:
        description: The path to run the release in, e.g. '.' or 'packages/mcp-server'
        required: true

  release:
    types: [published]

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # required for gh release upload
      id-token: write # required for auth with npm registry

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          yarn install

      - name: Publish to NPM
        run: |
          if [ -n "$INPUT_PATH" ]; then
            PATHS_RELEASED="[\"$INPUT_PATH\"]"
          else
            PATHS_RELEASED='[\".\", \"packages/mcp-server\"]'
          fi
          yarn tsn scripts/publish-packages.ts "{ \"paths_released\": \"$PATHS_RELEASED\" }"
        env:
          INPUT_PATH: ${{ github.event.inputs.path }}

      - name: Upload MCP Server DXT GitHub release asset
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            packages/mcp-server/coingecko_coingecko_typescript_api.mcpb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
